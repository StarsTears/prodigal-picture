global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    application: prodigal-picture

scrape_configs:
  - job_name: 'prodigal-picture-system'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:9999']
        labels:
          service: 'system'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
