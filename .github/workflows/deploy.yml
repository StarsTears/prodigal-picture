name: "Prodigal Picture Deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'system/**'           # 后端代码变更
      - 'prodigal-picture-ui/**'  # 前端代码变更
      - 'docker-compose.yml'  # 编排文件变更
      - 'system/Dockerfile*'         # Dockerfile 变更
      - 'prodigal-picture-ui/Dockerfile'
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Start service  # 一个常用的SSH 连接 Action
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22}}
          script_stop: true
          command_timeout: 30m  # 关键：增加超时时间
          script: |
            # 先测试基本命令
            echo "=== Testing connection ==="
            whoami
            groups

            # 先定义变量（在 sg 外部）
            PROJECT_DIR="/opt/project/prodigal-picture"
            echo "📁 Project directory: $PROJECT_DIR"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            echo "Current directory: $(pwd)"

            if [ -d ".git" ]; then
              echo "🔄 Repository exists, pulling latest changes..."
              git fetch origin main
              git reset --hard origin/main
            else
               echo "🔄 First deployment, cloning repository..."
               # 如果目录不为空，先清理（包含隐藏文件）
               if [ "$(ls -A)" ]; then
                  echo "Directory not empty, cleaning..."
                  find . -maxdepth 1 -not -name '.' -not -name '..' -exec rm -rf {} +
               fi
               echo "=== Debug: Before git clone ==="
               git clone https://github.com/${{ github.repository }}.git .
               # 确保检出 main 分支（避免默认分支不是 main 导致代码不一致）
               git checkout main
            fi
            echo "📌 Current commit: $(git rev-parse --short HEAD)"
            # 先从 GitHub Secrets 获取值并赋给普通变量
            DB_HOST="${{ secrets.DB_HOST }}"
            DB_NAME="${{ secrets.DB_NAME }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            MONGO_HOST="${{ secrets.MONGO_HOST }}"
            MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}"
            MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"
            RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}"
            RABBITMQ_VIRTUAL_HOST="${{ secrets.RABBITMQ_VIRTUAL_HOST }}"
            RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}"
            RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}"
            ALIYUNAI_WORKSPACEID="${{ secrets.ALIYUNAI_WORKSPACEID }}"
            ALIYUNAI_APIKEY="${{ secrets.ALIYUNAI_APIKEY }}"
            COS_CLIENT_HOST="${{ secrets.COS_CLIENT_HOST }}"
            COS_CLIENT_SECRETID="${{ secrets.COS_CLIENT_SECRETID }}"
            COS_CLIENT_SECRETKEY="${{ secrets.COS_CLIENT_SECRETKEY }}"
            COS_CLIENT_BUCKET="${{ secrets.COS_CLIENT_BUCKET }}"
            COS_CLIENT_REGION="${{ secrets.COS_CLIENT_REGION }}"
            
            # 创建 .env 文件
            cat > .env << EOF
            TZ=Asia/Shanghai
            SPRING_PROFILES_ACTIVE=prod
            DB_PORT=3306
            DB_HOST=${DB_HOST}
            DB_NAME=${DB_NAME}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            REDIS_HOST=${REDIS_HOST}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            MONGO_HOST=${MONGO_HOST}
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_PASSWORD=${MAIL_PASSWORD}
            RABBITMQ_HOST=${RABBITMQ_HOST}
            RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            ALIYUNAI_WORKSPACEID=${ALIYUNAI_WORKSPACEID}
            ALIYUNAI_APIKEY=${ALIYUNAI_APIKEY}
            COS_CLIENT_HOST=${COS_CLIENT_HOST}
            COS_CLIENT_SECRETID=${COS_CLIENT_SECRETID}
            COS_CLIENT_SECRETKEY=${COS_CLIENT_SECRETKEY}
            COS_CLIENT_BUCKET=${COS_CLIENT_BUCKET}
            COS_CLIENT_REGION=${COS_CLIENT_REGION}
            EOF


            # 复制模板并替换变量
            cp prodigal-picture-ui/nginx.conf.template prodigal-picture-ui/nginx.conf
            sed -i "s|{{COS_CLIENT_BUCKET}}|${COS_CLIENT_BUCKET}|g" prodigal-picture-ui/nginx.conf
            sed -i "s|{{COS_CLIENT_REGION}}|${COS_CLIENT_REGION}|g" prodigal-picture-ui/nginx.conf
            
            echo "🐳 Building and starting containers..."
            sudo docker compose down
            sudo docker compose up -d --build
            
            sudo docker image prune -f || true
            
            echo "🏥 Performing health check..."
            sleep 40
            if curl -sf http://127.0.0.1:9999/api/health/check | grep -q OK; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Health check failed!"
              sudo docker compose logs --tail=50
              exit 1
            fi
