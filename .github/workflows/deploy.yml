name: Deploy to Lighthouse

on:
  push:
    branches:
      - main
    paths:
      - 'system/**'
      - 'prodigal-picture-ui/**'
      - 'docker-compose.yml'
      - 'prometheus.yml'
      - 'grafana/**'
      - 'system/Dockerfile*'
      - 'prodigal-picture-ui/Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================
      # 第一步：获取当前 Runner 的公网 IP
      # ==========================================
      - name: 获取 Runner IP 地址
        id: ip
        uses: haythem/public-ip@v1.2

      # ==========================================
      # 第二步：将 Runner IP 加入防火墙白名单（放行 SSH 22 端口）
      # ==========================================
      - name: 添加 Runner IP 到防火墙白名单
        run: |
          # 安装腾讯云 CLI
          pip install tccli

          # 配置临时凭证
          tccli configure set secretId ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          tccli configure set secretKey ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          # 注意：轻量服务器使用 lighthouse 产品，地域需要指定
          tccli configure set region ap-guangzhou  # 请替换为你的服务器地域

          # 调用 Lighthouse API 添加入站防火墙规则
          # 注意：Lighthouse 的防火墙规则 API 是 ModifyFirewallRules
          tccli lighthouse ModifyFirewallRules \
            --InstanceId ${{ secrets.LIGHTHOUSE_INSTANCE_ID }} \
            --FirewallRules '[
              {
                "Protocol": "TCP",
                "CidrBlock": "${{ steps.ip.outputs.ipv4 }}/32",
                "Port": "22",
                "Action": "ACCEPT",
                "FirewallRuleDescription": "Temp allow GitHub Actions runner"
              }
            ]'
        shell: bash

      # 等待几秒让防火墙规则生效
      - name: 等待规则生效
        run: sleep 5
        shell: bash

      # ==========================================
      # 第三步：执行部署（你的原有 SSH 脚本，无需改动）
      # ==========================================
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22  # 固定为 22
          script_stop: true
          command_timeout: 40m
          script: |
            # ==========================================
            # 0. 强制清理 SSH 配置（必须在最前面）
            # ==========================================
            echo "=== Force cleaning SSH config ==="
            
            rm -f ~/.ssh/config
            chmod 600 ~/.ssh/github_deploy 2>/dev/null || true
            export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/github_deploy -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"

            PROJECT_DIR="/opt/project/prodigal-picture"
            echo "Project directory: $PROJECT_DIR"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            echo "Current directory: $(pwd)"

            GIT_SSH_URL="git@github.com:${{ github.repository }}.git"

            if [ -d ".git" ]; then
              echo "Repository exists, pulling latest changes..."
              git remote set-url origin ${GIT_SSH_URL}
              git fetch origin main
              git reset --hard origin/main
            else
              echo "First deployment, cloning repository..."
              if [ "$(ls -A)" ]; then
                echo "Directory not empty, cleaning..."
                find . -maxdepth 1 -not -name '.' -not -name '..' -exec rm -rf {} +
              fi
              git clone ${GIT_SSH_URL} .
              git checkout main
            fi
            echo "Current commit: $(git rev-parse --short HEAD)"

            DB_HOST="${{ secrets.DB_HOST }}"
            DB_NAME="${{ secrets.DB_NAME }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            MONGO_HOST="${{ secrets.MONGO_HOST }}"
            MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}"
            MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"
            RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}"
            RABBITMQ_VIRTUAL_HOST="${{ secrets.RABBITMQ_VIRTUAL_HOST }}"
            RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}"
            RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}"
            ALIYUNAI_WORKSPACEID="${{ secrets.ALIYUNAI_WORKSPACEID }}"
            ALIYUNAI_APIKEY="${{ secrets.ALIYUNAI_APIKEY }}"
            COS_CLIENT_HOST="${{ secrets.COS_CLIENT_HOST }}"
            COS_CLIENT_SECRETID="${{ secrets.COS_CLIENT_SECRETID }}"
            COS_CLIENT_SECRETKEY="${{ secrets.COS_CLIENT_SECRETKEY }}"
            COS_CLIENT_BUCKET="${{ secrets.COS_CLIENT_BUCKET }}"
            COS_CLIENT_REGION="${{ secrets.COS_CLIENT_REGION }}"
            GRAFANA_PASSWORD="${{ secrets.GRAFANA_PASSWORD }}"
            CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"

            # 创建 .env 文件
            cat > .env << EOF
            TZ=Asia/Shanghai
            SPRING_PROFILES_ACTIVE=prod
            DB_PORT=3306
            DB_HOST=${DB_HOST}
            DB_NAME=${DB_NAME}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            REDIS_HOST=${REDIS_HOST}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            MONGO_HOST=${MONGO_HOST}
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_PASSWORD=${MAIL_PASSWORD}
            RABBITMQ_HOST=${RABBITMQ_HOST}
            RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            ALIYUNAI_WORKSPACEID=${ALIYUNAI_WORKSPACEID}
            ALIYUNAI_APIKEY=${ALIYUNAI_APIKEY}
            COS_CLIENT_HOST=${COS_CLIENT_HOST}
            COS_CLIENT_SECRETID=${COS_CLIENT_SECRETID}
            COS_CLIENT_SECRETKEY=${COS_CLIENT_SECRETKEY}
            COS_CLIENT_BUCKET=${COS_CLIENT_BUCKET}
            COS_CLIENT_REGION=${COS_CLIENT_REGION}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
            EOF
            
            # 清理被污染的 .env 文件
            sed -i '/DRONE_SSH_PREV_COMMAND_EXIT_CODE/d' .env
            # 去除 YAML 缩进导致的前导空格
            sed -i 's/^[[:space:]]*//' .env

            cp prodigal-picture-ui/nginx.conf.template prodigal-picture-ui/nginx.conf
            sed -i "s|{{COS_CLIENT_BUCKET}}|${COS_CLIENT_BUCKET}|g" prodigal-picture-ui/nginx.conf
            sed -i "s|{{COS_CLIENT_REGION}}|${COS_CLIENT_REGION}|g" prodigal-picture-ui/nginx.conf

            # 替换 sharding-prod.yml 中的占位符
            sed -i "s|\${DB_HOST}|${DB_HOST}|g" system/src/main/resources/sharding-prod.yml
            sed -i "s|\${DB_NAME}|${DB_NAME}|g" system/src/main/resources/sharding-prod.yml
            sed -i "s|\${DB_USERNAME}|${DB_USERNAME}|g" system/src/main/resources/sharding-prod.yml
            sed -i "s|\${DB_PASSWORD}|${DB_PASSWORD}|g" system/src/main/resources/sharding-prod.yml

            echo "Building new images (old containers keep running)..."
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            sudo -E docker compose build --parallel

            echo "Switching to new containers..."
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d || {
              echo "docker compose up failed!"
              sudo docker compose logs --tail=50
              exit 1
            }

            echo "Current container status:"
            sudo docker compose ps

            sudo docker image prune -f || true

            echo "Waiting 30s for containers to stabilize..."
            sleep 30

            echo "Performing health check..."
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1:9999/api/health/check | grep -q OK; then
                echo "Backend healthy!"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Backend health check failed!"
                sudo docker compose logs system --tail=200
                exit 1
              fi
              echo "Waiting for backend... ($i/20)"
              sleep 10
            done

            if curl -sf http://127.0.0.1:81/ > /dev/null; then
              echo "Frontend healthy!"
            else
              echo "Frontend health check failed!"
              sudo docker compose logs ui --tail=50
              exit 1
            fi
            echo "Deployment successful!"

      # ==========================================
      # 第四步：部署完成后，从防火墙移除 Runner IP
      # ==========================================
      - name: 从防火墙移除 Runner IP
        if: always()  # 无论部署成功与否，都会执行清理
        run: |
          # 注意：Lighthouse 的删除规则需要精确匹配协议、端口、来源和动作
          tccli lighthouse DeleteFirewallRules \
            --InstanceId ${{ secrets.LIGHTHOUSE_INSTANCE_ID }} \
            --FirewallRules '[
              {
                "Protocol": "TCP",
                "CidrBlock": "${{ steps.ip.outputs.ipv4 }}/32",
                "Port": "22",
                "Action": "ACCEPT"
              }
            ]'
        shell: bash