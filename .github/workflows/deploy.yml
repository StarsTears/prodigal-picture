name: "Prodigal Picture Deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'system/**'           # 后端代码变更
      - 'prodigal-picture-ui/**'  # 前端代码变更
      - 'docker-compose.yml'  # 编排文件变更
      - 'system/Dockerfile*'         # Dockerfile 变更
      - 'prodigal-picture-ui/Dockerfile'
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Start service  # 一个常用的SSH 连接 Action
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22}}
          script_stop: true
          script: |
            sg docker -c '
              # ===== 配置区域 =====
              # 你可以根据需要修改这个路径
              PROJECT_DIR="/opt/project/prodigal-picture"  # 自定义路径
              # 或者使用用户目录
              # PROJECT_DIR="/home/${{ secrets.SSH_USER }}/apps/prodigal"
              # 或者使用绝对路径
              # PROJECT_DIR="/opt/prodigal-travel"
              
              echo "📁 Project directory: $PROJECT_DIR"
              
              # 创建目录
              mkdir -p $PROJECT_DIR
              
              # 克隆或更新代码
              cd $PROJECT_DIR
              echo "Current directory: $(pwd)"
              
              if [ ! -d ".git" ]; then
                echo "🔄 First deployment - cloning repository..."
                git clone https://github.com/${{ github.repository }}.git .
              else
                echo "🔄 Pulling latest changes..."
                git fetch  origin main
                git reset --hard origin/main  # 强制与远程保持一致
              fi
              
               # 显示当前版本
              echo "📌 Current commit: $(git rev-parse --short HEAD)"
              
              # 创建 .env 文件
              cat > .env << EOF
              TZ=Asia/Shanghai
              SPRING_PROFILES_ACTIVE=prod
              DB_PORT=3306
              DB_HOST=127.0.0.1
              DB_NAME=${{ secrets.DB_NAME }}
              DB_USERNAME=${{ secrets.DB_USERNAME }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
              MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
              MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
              RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
              RABBITMQ_VIRTUAL_HOST=${{ secrets.RABBITMQ_VIRTUAL_HOST }}
              RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
              RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
              ALIYUNAI_WORKSPACEID=${{ secrets.ALIYUN_AI_WORKSPACE_ID }}
              ALIYUNAI_APIKEY=${{ secrets.ALIYUN_AI_API_KEY }}
              COS_CLIENT_HOST=${{ secrets.COS_CLIENT_HOST }}
              COS_CLIENT_SECRETID=${{ secrets.COS_CLIENT_SECRETID }}
              COS_CLIENT_SECRETKEY=${{ secrets.COS_CLIENT_SECRETKEY }}
              COS_CLIENT_BUCKET=${{ secrets.COS_CLIENT_BUCKET }}
              COS_CLIENT_REGION=${{ secrets.COS_CLIENT_REGION }}
              EOF
              
              # 构建和部署
              echo "🐳 Building and starting containers..."
              docker compose down
              docker compose up -d --build
              
              # 清理
              docker image prune -f || true
              
              # 健康检查
              echo "🏥 Performing health check..."
              sleep 15
              if curl -sf -X POST http://127.0.0.1:9999/api/health/check | grep -q OK; then
                echo "✅ Deployment successful!"
                echo "📍 Project location: $PROJECT_DIR"
              else
                echo "❌ Health check failed!"
                docker-compose logs --tail=50
                exit 1
              fi
            '
