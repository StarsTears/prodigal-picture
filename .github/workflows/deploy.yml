name: "Prodigal Picture Deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'system/**'
      - 'prodigal-picture-ui/**'
      - 'docker-compose.yml'
      - 'prometheus.yml'
      - 'grafana/**'
      - 'system/Dockerfile*'
      - 'prodigal-picture-ui/Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22}}
          script_stop: true
          command_timeout: 30m
          script: |
            echo "=== Testing connection ==="
            whoami
            groups

            PROJECT_DIR="/opt/project/prodigal-picture"
            echo "Project directory: $PROJECT_DIR"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            echo "Current directory: $(pwd)"

            if [ -d ".git" ]; then
              echo "🔄 Repository exists, pulling latest changes..."
              git fetch origin main
              git reset --hard origin/main
            else
               echo "First deployment, cloning repository..."
               if [ "$(ls -A)" ]; then
                  echo "Directory not empty, cleaning..."
                  find . -maxdepth 1 -not -name '.' -not -name '..' -exec rm -rf {} +
               fi
               echo "=== Debug: Before git clone ==="
               git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git .
               # 确保检出 main 分支（避免默认分支不是 main 导致代码不一致）
               git checkout main
            fi
            echo "Current commit: $(git rev-parse --short HEAD)"

            DB_HOST="${{ secrets.DB_HOST }}"
            DB_NAME="${{ secrets.DB_NAME }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            MONGO_HOST="${{ secrets.MONGO_HOST }}"
            MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}"
            MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"
            RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}"
            RABBITMQ_VIRTUAL_HOST="${{ secrets.RABBITMQ_VIRTUAL_HOST }}"
            RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}"
            RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}"
            ALIYUNAI_WORKSPACEID="${{ secrets.ALIYUNAI_WORKSPACEID }}"
            ALIYUNAI_APIKEY="${{ secrets.ALIYUNAI_APIKEY }}"
            COS_CLIENT_HOST="${{ secrets.COS_CLIENT_HOST }}"
            COS_CLIENT_SECRETID="${{ secrets.COS_CLIENT_SECRETID }}"
            COS_CLIENT_SECRETKEY="${{ secrets.COS_CLIENT_SECRETKEY }}"
            COS_CLIENT_BUCKET="${{ secrets.COS_CLIENT_BUCKET }}"
            COS_CLIENT_REGION="${{ secrets.COS_CLIENT_REGION }}"
            GRAFANA_PASSWORD="${{ secrets.GRAFANA_PASSWORD }}"
            CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"

            cat > .env << EOF
            TZ=Asia/Shanghai
            SPRING_PROFILES_ACTIVE=prod
            DB_PORT=3306
            DB_HOST=${DB_HOST}
            DB_NAME=${DB_NAME}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            REDIS_HOST=${REDIS_HOST}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            MONGO_HOST=${MONGO_HOST}
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_PASSWORD=${MAIL_PASSWORD}
            RABBITMQ_HOST=${RABBITMQ_HOST}
            RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            ALIYUNAI_WORKSPACEID=${ALIYUNAI_WORKSPACEID}
            ALIYUNAI_APIKEY=${ALIYUNAI_APIKEY}
            COS_CLIENT_HOST=${COS_CLIENT_HOST}
            COS_CLIENT_SECRETID=${COS_CLIENT_SECRETID}
            COS_CLIENT_SECRETKEY=${COS_CLIENT_SECRETKEY}
            COS_CLIENT_BUCKET=${COS_CLIENT_BUCKET}
            COS_CLIENT_REGION=${COS_CLIENT_REGION}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
            EOF

            cp prodigal-picture-ui/nginx.conf.template prodigal-picture-ui/nginx.conf
            sed -i "s|{{COS_CLIENT_BUCKET}}|${COS_CLIENT_BUCKET}|g" prodigal-picture-ui/nginx.conf
            sed -i "s|{{COS_CLIENT_REGION}}|${COS_CLIENT_REGION}|g" prodigal-picture-ui/nginx.conf

            echo "Building new images (old containers keep running)..."
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            sudo -E docker compose build --parallel

            echo "Switching to new containers..."
            sudo docker compose down --remove-orphans
            sudo docker compose up -d

            sudo docker image prune -f || true

            echo "Performing health check..."
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:9999/api/health/check | grep -q OK; then
                echo "Backend healthy!"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Backend health check failed!"
                sudo docker compose logs --tail=50
                exit 1
              fi
              echo "Waiting for backend... ($i/15)"
              sleep 10
            done

            if curl -sf http://127.0.0.1:81/ > /dev/null; then
              echo "Frontend healthy!"
            else
              echo "Frontend health check failed!"
              sudo docker compose logs ui --tail=20
              exit 1
            fi
            echo "Deployment successful!"
