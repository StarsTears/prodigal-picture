name: "dev"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check project structure
        run: |
          echo "✅ Checking project structure..."
          test -f docker-compose.yml && echo "✓ docker-compose.yml exists"
          test -d system && echo "✓ system directory exists"
          test -d prodigal-picture-ui && echo "✓ ui directory exists"
          echo "✅ PR check passed!"

      - name: Test Docker build (Backend)
        run: |
          docker build -f system/Dockerfile -t backend-test .

      - name: Test Docker build (Frontend)
        run: |
          docker build -f prodigal-picture-ui/Dockerfile -t frontend-test ./prodigal-picture-ui
