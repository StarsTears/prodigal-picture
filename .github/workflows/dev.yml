name: "dev"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: prodigal-picture-ui/package-lock.json

      - name: Install Dependencies
        working-directory: ./prodigal-picture-ui
        run: npm ci

      - name: Run Linter
        working-directory: ./prodigal-picture-ui
        run: npm run lint

      - name: Build Frontend
        working-directory: ./prodigal-picture-ui
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: prodigal-picture-ui/dist/

    docker-build:
      name: Docker Image Build Test
      runs-on: ubuntu-latest
      needs: [ backend-test, frontend-build ]

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Test Backend Docker Build
          uses: docker/build-push-action@v5
          with:
            context: .
            file: system/Dockerfile
            push: false
            load: true
            tags: prodigal-picture-system:test
            cache-from: type=gha
            cache-to: type=gha,mode=max

        - name: Test Frontend Docker Build
          uses: docker/build-push-action@v5
          with:
            context: ./prodigal-picture-ui
            file: prodigal-picture-ui/Dockerfile
            push: false
            load: true
            tags: prodigal-picture-ui:test
            cache-from: type=gha
            cache-to: type=gha,mode=max
 
