server:
  port: 9999
  servlet:
    context-path: /api
  #session 配置
  session:
    timeout: 2592000 #30天过期
spring:
  application:
    name: prodigal-system
  #开放更大的上传文件大小
  servlet:
    multipart:
      max-file-size: 10MB
  #数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # elasticsearch
#  elasticsearch:
#    uris: http://localhost:9200
#    password:
#    username:
  #空间图片分表
  shardingsphere:
    datasource:
      names: prodigal-picture
      prodigal-picture:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
    rules:
      sharding:
        tables:
          picture:
            actual-data-nodes: prodigal-picture.picture # 动态分表
            table-strategy:
              standard:
                sharding-column: spaceId
                sharding-algorithm-name: picture-sharding-algorithm # 分表算法 自定义分片算法
        sharding-algorithms:
          picture-sharding-algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.prodigal.system.manager.sharding.PictureShardingAlgorithm
    props:
      sql-show: true
  #redis 配置
  redis:
    database: 1
    host: ${REDIS_HOST:127.0.0.1}
    port: 6379
    timeout: 5000
  data:
    #mongoDB
    mongodb:
      host: ${MONGO_HOST:127.0.0.1}
      port: 27017
      database: prodigal-picture
      auto-index-creation: true
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
  mail:
    host: smtp.qq.com
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# mybatis plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_CLIENT_HOST}
    secretId: ${COS_CLIENT_SECRETID}
    secretKey: ${COS_CLIENT_SECRETKEY}
    region: ${COS_CLIENT_BUCKET}
    bucket: ${COS_CLIENT_REGION}
# 阿里云 AI 配置
aliYunAi:
  workSpaceId: ${ALIYUNAI_WORKSPACEID}
  apiKey: ${ALIYUNAI_APIKEY}

#github
github:
  owner:  Lang
  repo:  prodigal-picture

# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "Prodigal Picture 接口文档"
    version: v1.0
    description: "Prodigal Picture 云图库接口文档"
    concat: Lang
    group:
      default:
        group-name: "uat"
        api-rule: package
        api-rule-resources:
          - com.prodigal.system.controller