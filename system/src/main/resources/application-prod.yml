logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] [%X{spanId}] [%X{requestId}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId}] [%X{spanId}] [%X{requestId}] [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/prodigal-system.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/prodigal-system-%d{yyyy-MM-dd}.%i.log
      max-file-size: 50MB
      max-history: 30

spring:
  #数据库配置
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:sharding-prod.yml
  # Flyway 数据库迁移（直连 MySQL，绕过 ShardingSphere）
  flyway:
    enabled: true
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  #空间图片分表
  shardingsphere:
    datasource:
      names: prodigal-picture
      prodigal-picture:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
    rules:
      sharding:
        tables:
          picture:
            actual-data-nodes: prodigal-picture.picture # 动态分表
            table-strategy:
              standard:
                sharding-column: spaceId
                sharding-algorithm-name: picture-sharding-algorithm # 分表算法 自定义分片算法
        sharding-algorithms:
          picture-sharding-algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.prodigal.system.manager.sharding.PictureShardingAlgorithm
    props:
      sql-show: false

  data:
    # redis
    redis:
      database: 1
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      # 连接超时设置
      # 支持两种格式：直接写毫秒数字，或者使用 Duration 格式如 5s, 500ms
      timeout: 5000
      # Lettuce 连接池配置（推荐配置，能有效管理连接资源）
      lettuce:
        pool:
          max-active: 8      # 连接池最大连接数（正数即可，可参考设为 8~20）
          max-idle: 8        # 连接池中的最大空闲连接
          min-idle: 0        # 连接池中的最小空闲连接
          max-wait: 1s       # 当连接池耗尽时，获取连接的最大等待时间
    #mongoDB
    mongodb:
      host: ${MONGO_HOST:127.0.0.1}
      port: 27017
      database: prodigal-picture
      auto-index-creation: true
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
  mail:
    host: smtp.qq.com
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# mybatis plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: is_delete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_CLIENT_HOST}
    secretId: ${COS_CLIENT_SECRETID}
    secretKey: ${COS_CLIENT_SECRETKEY}
    region: ${COS_CLIENT_REGION}
    bucket: ${COS_CLIENT_BUCKET}
# 阿里云 AI 配置
aliYunAi:
  workSpaceId: ${ALIYUNAI_WORKSPACEID}
  apiKey: ${ALIYUNAI_APIKEY}

# SpringDoc + Knife4j 接口文档配置（生产环境禁用）
springdoc:
  api-docs:
    enabled: false
knife4j:
  enable: false

# Actuator 监控（生产仅暴露健康检查和 Prometheus）
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1

# 其余需要使用配置文件
# CORS 允许的前端域名（多个用逗号分隔）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
# 以图搜图
bing:
  api:
    key: ${BING_API_KEY:XXX}
google:
  api:
    key: ${GOOGLE_API_KEY:XXX}