services:
  system:
    build:
      context: .
      dockerfile: system/Dockerfile
    container_name: prodigal-picture-system
    restart: unless-stopped
    ports:
      - "9999:9999"
    env_file:
      - .env
    networks:
      - prodigal-network
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - TZ=Asia/Shanghai
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - COS_CLIENT_BUCKET=${COS_CLIENT_BUCKET}
      - COS_CLIENT_REGION=${COS_CLIENT_REGION}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9999/api/health/check" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: ./prodigal-picture-ui
      dockerfile: Dockerfile
    container_name: prodigal-picture-ui
    restart: unless-stopped
    ports:
      - "81:81"
    depends_on:
      - system
    networks:
      - prodigal-network
    environment:
      - TZ=Asia/Shanghai
      - COS_CLIENT_BUCKET=${COS_CLIENT_BUCKET}
      - COS_CLIENT_REGION=${COS_CLIENT_REGION}

  prometheus:
    image: prom/prometheus:latest
    container_name: prodigal-picture-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - prodigal-network

  grafana:
    image: grafana/grafana:latest
    container_name: prodigal-picture-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_PLUGINS_PREINSTALL_DISABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - prodigal-network
    depends_on:
      - prometheus

networks:
  prodigal-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: